name: Deploy to Azure Server
on:
  push:
    branches: [ main ]
  pull_request:
    types: [ closed ]
    branches: [ main ]
jobs:
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
       
      - name: Deploy to Azure Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to project directory
            cd CodeBEGen
           
            # Update code from repository
            git pull origin main
            
            # Create virtual environment if it doesn't exist
            python3 -m venv .venv
       
            # Activate virtual environment
            source .venv/bin/activate
           
            # Install dependencies with Poetry
            poetry install
           
            # Update environment file with GitHub secrets
            cat > .env << EOL
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY}}
            ENVIRONMENT=production
            # Database configuration
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=5432
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_TYPE=${{ secrets.DB_TYPE }}
            EOL
           
            # Ensure proper permissions for env file
            chmod 600 .env
            # Run Alembic migrations
            echo "Running Alembic migrations..."
            alembic upgrade head
           
            # Restart the FastAPI service using systemd
            echo "Restarting FastAPI service..."
            sudo systemctl restart fastapi.service
            
            # Wait a few seconds to ensure service has time to start
            sleep 5
     
      - name: Verify Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Check if the service is running properly
            SERVICE_STATUS=$(sudo systemctl is-active fastapi.service)
            
            if [ "$SERVICE_STATUS" = "active" ]; then
              echo "FastAPI service is running successfully!"
              exit 0
            else
              echo "FastAPI service failed to start. Checking logs..."
              sudo journalctl -u fastapi.service -n 20
              exit 1
            fi