name: Deploy to Azure Server
on:
  push:
    branches: [ main ]
  pull_request:
    types: [ closed ]
    branches: [ main ]

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Deploy to Azure Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to project directory
            cd CodeBEGen
            
            # Update code from repository
            git pull origin main

            # Create virtual environment if it doesn't exist
            python3 -m venv .venv
        
            # Activate virtual environment
            source .venv/bin/activate
            
            # Install dependencies with Poetry
            poetry install
            
            # Update environment file with GitHub secrets
            cat > .env << EOL
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY}}
            ENVIRONMENT=production
            EOL
            
            # Ensure proper permissions for env file
            chmod 600 .env
            
            # Instead of killing the process, use a restart script approach
            # Create a restart script
            cat > restart.sh << 'EOSCRIPT'
            #!/bin/bash
            
            # Check if app is already running and get its PID
            APP_PID=$(pgrep -f "python main.py" || echo "")
            
            # Start new instance with different log file
            echo "Starting new application instance..."
            TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
            mkdir -p logs
            nohup poetry run python main.py > logs/app_${TIMESTAMP}.log 2>&1 &
            NEW_PID=$!
            
            # Give the new instance time to initialize
            sleep 5
            
            # Check if new instance is running
            if ps -p $NEW_PID > /dev/null; then
              echo "New instance started successfully with PID: $NEW_PID"
              
              # Create symlink to latest log
              ln -sf logs/app_${TIMESTAMP}.log app.log
              
              # Only terminate old instance if new one is running
              if [ -n "$APP_PID" ]; then
                echo "Gracefully terminating old instance with PID: $APP_PID"
                kill $APP_PID
              fi
              
              echo "Deployment complete!"
              exit 0
            else
              echo "New instance failed to start properly. Check logs."
              cat logs/app_${TIMESTAMP}.log
              exit 1
            fi
            EOSCRIPT
            
            # Make script executable
            chmod +x restart.sh
            
            # Run the restart script
            ./restart.sh
      
      - name: Verify Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd CodeBEGen
            
            # Check if process is running
            if pgrep -f "python main.py" > /dev/null; then
              echo "Application is running successfully!"
              exit 0
            else
              echo "Application failed to start. Check logs."
              cat app.log
              exit 1
            fi