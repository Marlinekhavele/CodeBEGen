[project]
name = "code-gen-be"
version = "0.1.0"
description = "CodegenBE is an AI-powered tool that enables developers to rapidly generate backend API functionalities with minimal friction."
authors = [
    {name = "Marline Khavele",email = "khavelemarline@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi (>=0.115.12,<0.116.0)",
    "alembic (>=1.15.2,<2.0.0)",
    "pre-commit (>=4.2.0,<5.0.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
